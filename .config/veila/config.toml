[weather]
enabled = false

[visuals.date]
format = "iso"
font_family = "RobotoMono Nerd Font"
font_weight = 400
color = "rgba(255, 255, 255, 0.4)"
font_size = 20
halign = "center"
valign = "center"
x = 0
y = 0

[visuals.input]
placeholder = "Password"
background_color = "rgba(255, 255, 255, 0.08)"
border_color = "rgba(255, 255, 255, 0.08)"
border_width = 3
width = 200
height = 25
radius = 0
mask_color = "#ffffff"
font_family = "RobotoMono Nerd Font"
font_weight = 400
font_size = 16
halign = "center"
valign = "center"
x = 0
y = 50

[visuals.status]
mode = "inline"
rejected_color = "#FFD5D5"
pending_color = "#ECECEC"

[visuals.eye]
color = "rgba(255, 255, 255, 0.72)"

[visuals.caps_lock]
color = "rgba(255, 255, 255, 0.52)"

[visuals.placeholder]
color = "rgba(255, 255, 255, 0.6)"

[visuals.avatar]
enabled = false

[visuals.username]
enabled = false

[visuals.keyboard]
enabled = false
background_size = 46
radius = 0
background_color = "rgba(255, 255, 255, 0.05)"
color = "rgba(255, 255, 255, 0.68)"
size = 16
halign = "right"
valign = "top"
x = -24
y = 21

[visuals.battery]
background_color = "rgba(255, 255, 255, 0.05)"
background_size = 46
radius = 0
color = "rgba(255, 255, 255, 0.68)"
size = 20
halign = "right"
valign = "top"
x = -78
y = 21

[visuals.weather.icon]
size = 40
opacity = 80
halign = "left"
valign = "bottom"
x = 40
y = -112

[visuals.weather.temperature]
font_size = 40
font_family = "Geom"
font_weight = 600
letter_spacing = 0
color = "rgba(255, 255, 255, 0.73)"
halign = "left"
valign = "bottom"
x = 40
y = -70

[visuals.weather.location]
font_size = 22
font_family = "RobotoMono Nerd Font"
font_weight = 400
color = "rgba(214, 227, 255, 0.58)"
halign = "left"
valign = "bottom"
x = 40
y = -44

[visuals.now_playing]
enabled = true  # Show the now-playing widget when MPRIS media metadata is available (accepts true or false)

[visuals.now_playing.artwork]
size = 80
radius = 0
opacity = 90
halign = "left"
valign = "center"
x = 7
y = 0
relative_to = "now_playing"

[visuals.now_playing.artist]
width = 318
color = "rgba(255, 255, 255, 0.39)"
font_family = "RobotoMono Nerd Font"
font_size = 18
font_weight = 400
halign = "center"
valign = "bottom"
x = 45
y = -25
relative_to = "now_playing"

[visuals.now_playing.title]
width = 318
color = "rgba(255, 255, 255, 0.69)"
font_family = "RobotoMono Nerd Font"
font_size = 18
font_weight = 400
halign = "center"
valign = "top"
x = 45
y = 25
relative_to = "now_playing"

# Now playing backdrop
[[visuals.backdrop]]
enabled = true
name = "now_playing"
show_when = "now_playing"
mode = "blur"
color = "rgba(255, 255, 255, 0.05)"
blur_strength = 12
radius = 0
border_color = "#FFFFFF18"
width = 420
height = 100
halign = "center"
valign = "bottom"
x = 0
y = 0

[visuals.clock]
format = "24h"  # Clock format (accepts "24h" or "12h")
font_family = "RobotoMono Nerd Font"
font_weight = 400
font_style = "normal"
style = "standard"
meridiem_font_size = 22
meridiem_x = 6
meridiem_y = 7
color = "rgba(255, 255, 255, 0.4)"
font_size = 88
halign = "center"
valign = "center"
x = 0
y = -60

[battery]
enabled = true

[background]
mode = "file"  # Background source (accepts "file", "gradient", "layered", "radial", or "solid")
path = "~/dotfiles/assets/current-wallpaper"  # Wallpaper image path used when mode = "file"
blur_strength = 10
